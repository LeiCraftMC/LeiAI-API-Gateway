version: '3.8'

services:
  leiai-api-gateway:
    image: gcr.leicraftmc.de/leicraftmc/leiai/api-gateway:latest
    ports:
      - "12117:12117"
    environment:
      - LAG_LOG_LEVEL=info
    volumes:
      - /opt/leiai/api-gateway/config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

